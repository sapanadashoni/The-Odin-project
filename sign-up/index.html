<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div>
        <form action="#" method="POST">
            <fieldset>
                <legend>SIGN UP</legend>
                    <div>
                        <label for="first_name">First Name</label>
                    <input type="text" id="first_name"  name="first_name" placeholder="Sapanaa..">
                    </div>
                    
                    <div>
                        <label for="last_name">Last name</label>
                    <input type="text name=last_name" id="last_name" placeholder="D...">
                    </div>


                    <div>
                        <label for="email">Email</label>
                    <input type="email" name-="email" id="email" placeholder="sapana@gmail.com">
                    </div>

                    
                    <div>
                        <label for="password">Password</label>
                    <input type="password" name="password" id="password">
                    </div>

                    <div>
                        <button type="submit">Create Account</button>
                    </div>

                    <div>
                        <p>Already have an account <button type="submit"> log in</button></p>
                    </div>
            </fieldset>
        </form>
    </div>
</body>
</html>
